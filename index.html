<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferhat Saygılı - Portfolyo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white font-sans">

  <!-- Navigation -->
  <nav class="fixed top-0 w-full bg-zinc-900/90 backdrop-blur-md z-50 border-b border-zinc-800">
    <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="text-xl font-bold">Ferhat Saygılı</h1>
      <div class="flex gap-5 text-sm font-medium">
        <a href="#start" class="hover:text-emerald-400 transition">Start</a>
        <a href="#ueber-mich" class="hover:text-emerald-400 transition">Über mich</a>
        <a href="#projekte" class="hover:text-emerald-400 transition">Projekte</a>
        <a href="#kontakt" class="hover:text-emerald-400 transition">Kontakt</a>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section id="start" class="min-h-screen flex items-center pt-16 pb-12">
    <div class="max-w-5xl mx-auto px-4 grid md:grid-cols-2 gap-8 items-center">
      <div class="space-y-5 text-center md:text-left">
        <h2 class="text-4xl sm:text-5xl font-bold leading-tight">
          Hallo, ich bin <span class="text-emerald-400">Ferhat Saygılı</span>
        </h2>
        <p class="text-xl sm:text-2xl text-emerald-400">Projekt Codierung</p>
        <p class="text-base sm:text-lg text-zinc-300">
          Ich fange heute an zu programmieren<br>
          und lerne ab heute Codes!<br><br>
          Mein großes Ziel: Bis 2027 eigene SaaS-Produkte entwickeln.
        </p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center md:justify-start pt-4">
          <a href="#projekte" class="bg-emerald-500 hover:bg-emerald-600 px-8 py-4 rounded-2xl font-semibold text-center">Meine Projekte</a>
          <a href="#kontakt" class="border-2 border-zinc-700 hover:border-white px-8 py-4 rounded-2xl font-semibold text-center">Kontakt</a>
        </div>
      </div>

      <div class="flex justify-center pt-8 md:pt-0">
        <div class="w-56 h-56 sm:w-72 sm:h-72 bg-gradient-to-br from-emerald-400 via-cyan-400 to-teal-500 rounded-3xl shadow-2xl flex items-center justify-center text-6xl">
          💻
        </div>
      </div>
    </div>
  </section>

</body>
</html>
